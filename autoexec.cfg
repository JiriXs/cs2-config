// --- SOUND ALIASES ---
alias miku "play \sounds\miku.vsnd; cl_hud_color 4"
alias teto "play \sounds\teto.vsnd; cl_hud_color 6"
alias neru "play \sounds\neru.vsnd; cl_hud_color 8"
snd_toolvolume 0.25


// SOUND ROTATION
alias knife_sound_0 "teto; alias selectknife "knife_sound_1""
alias knife_sound_1 "teto; alias selectknife "knife_sound_2""
alias knife_sound_2 "teto; alias selectknife "knife_sound_3""
alias knife_sound_3 "teto; alias selectknife "knife_sound_4""
alias knife_sound_4 "miku; alias selectknife "knife_sound_0""


// --- KNIFE/BOMB SELECT ---
alias selectknife "knife_sound_0"
bind 3 "slot3; selectknife"
bind 5 "slot5; neru"


// --- MOUSE BHOP ---
bind space "+jump"
bind mwheeldown "+jump"


// --- BOMB DROP ---
alias "+dropbomb" "slot3; slot5;"
alias "-dropbomb" "drop; slot1;"
bind z "+dropbomb"


// --- GRENADES ---
bind q "slot6"  // he grenade
bind c "slot7"  // flashbang
bind v "slot8"  // smoke
bind x "slot10" // molotov


